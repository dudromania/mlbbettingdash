name: MLB Betting Pipeline

on:
  schedule:
    # UTC times (subtract 5 hours from EST for standard time, 4 for daylight)
    # Assuming you want: 8AM, 11AM, 1PM, 3PM Central (Arkansas is Central Time)
    - cron: '0 14 * * *'  # 8AM CST (2PM UTC)
    - cron: '0 17 * * *'  # 11AM CST (5PM UTC)
    - cron: '0 19 * * *'  # 1PM CST (7PM UTC)
    - cron: '0 21 * * *'  # 3PM CST (9PM UTC)
  
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mlb_betting_model/requirements.txt
      
      - name: Set UTF-8 encoding
        run: |
          echo "PYTHONUTF8=1" >> $GITHUB_ENV
      
      - name: Run MLB pipeline
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd mlb_betting_model
          python main.py
      
      - name: Export dashboard data
        run: |
          cd mlb_betting_model
          python -c "from src.ingestion.daily_export import run_daily_export; run_daily_export()"
      
      - name: Copy exports to dashboard
        run: |
          cp mlb_betting_model/data/mlb_picks_export.json mlb_dashboard/
          cp mlb_betting_model/data/mlb_prop_picks_history.json mlb_dashboard/
      
      - name: Commit and push updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mlb_dashboard/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: MLB picks $(date +'%Y-%m-%d %H:%M UTC')" && git push)
      
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-logs
          path: mlb_betting_model/logs/
          retention-days: 7
